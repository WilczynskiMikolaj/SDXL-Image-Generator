<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Folder Body -->
  <rect x="16" y="36" width="80" height="60" rx="12" fill="url(#folderGradient)"/>

  <!-- Folder Tab -->
  <path d="M16 44C16 38 20 34 26 34H50C54 34 56 36 58 40L62 44H16Z" fill="url(#tabGradient)"/>

  <!-- Magnifier Lens -->
  <circle cx="78" cy="78" r="20" fill="url(#lensGradient)" stroke="#0F172A" stroke-width="4"/>

  <!-- Magnifier Handle -->
  <rect x="90" y="90" width="26" height="8" rx="4" transform="rotate(45 90 90)" fill="#1E293B"/>

  <defs>
    <!-- Folder Gradient (Gradio-like blue/green) -->
    <linearGradient id="folderGradient" x1="16" y1="36" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>

    <!-- Tab Gradient (Orange accent) -->
    <linearGradient id="tabGradient" x1="16" y1="34" x2="62" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>

    <!-- Lens Gradient -->
    <radialGradient id="lensGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(72 72) rotate(45) scale(28)">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </radialGradient>

  </defs>

</svg>